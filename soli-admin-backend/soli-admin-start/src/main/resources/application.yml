spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/soli-admin?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-enum-type-handler: com.soli.common.core.mybatis.handler.DbEnumTypeHandler
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.soli.*.core.entity

soli:
  auth:
    captcha:
      image:
        login-enable: false
        login-expire: 300
        register-enable: false
        register-expire: 600
      sms:
        login-expire: 300
        register-expire: 600
      email:
        login-expire: 300
        register-expire: 600
    jwt:
      secret: "f8sd9f8sd9f8sd9f8sd9f8sd9"
      issuer: "soli-auth"
      access-token-expire: 9999999
      refresh-token-expire: 9999999

logging:
  level:
    org.springframework.security: trace
