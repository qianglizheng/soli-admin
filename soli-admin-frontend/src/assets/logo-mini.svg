<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF" />
      <stop offset="100%" style="stop-color:#36cfc9" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Modern stylized "S" -->
  <path d="M70 20 
           C 30 20, 30 50, 60 50 
           L 70 50 
           C 100 50, 100 80, 70 80 
           L 30 80
           C 30 80, 20 80, 20 70" 
        fill="none" 
        stroke="url(#mainGradient)" 
        stroke-width="12" 
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#shadow)" />
        
  <!-- Complementary "A" accent or tech dot -->
  <circle cx="75" cy="25" r="8" fill="#36cfc9" />
  <circle cx="25" cy="75" r="6" fill="#409EFF" />
</svg>