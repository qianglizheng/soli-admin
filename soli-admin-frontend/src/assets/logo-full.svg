<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#409EFF" />
      <stop offset="100%" style="stop-color:#36cfc9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- "S" Symbol - A fluid wave/infinity loop shape representing Solutions/Solid -->
  <path d="M40 30 
           C 10 30, 10 70, 40 70 
           L 50 70 
           C 80 70, 80 110, 50 110 
           L 20 110" 
        fill="none" 
        stroke="url(#mainGradient)" 
        stroke-width="12" 
        stroke-linecap="round"
        filter="url(#glow)" />
        
  <!-- Dot for "i" concept integrated or just a decorative element -->
  <circle cx="80" cy="30" r="8" fill="#36cfc9" filter="url(#glow)" />

  <!-- Text "oli" - Using White for high contrast on dark bg -->
  <text x="95" y="85" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="bold" font-size="60" fill="#ffffff">oli</text>
  
  <!-- Text "Admin" in lighter weight - Using Light Gray for contrast but hierarchy -->
  <text x="180" y="85" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="60" fill="#dcdfe6">Admin</text>
  
  <!-- Underline accent -->
  <rect x="95" y="100" width="240" height="4" rx="2" fill="url(#mainGradient)" opacity="1" filter="url(#glow)" />
</svg>